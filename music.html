<div class="section-title">ALL SONGS</div>
<div id="songs-container"></div>

<footer>© 2026 BENNIX MUSIC | All Rights Reserved</footer>

<script>
fetch('songs.json')
  .then(response => response.json())
  .then(data => {

    const container = document.getElementById("songs-container");

    data.forEach(song => {
      const div = document.createElement("div");
      div.className = "music-card";

      div.innerHTML = `
        <h3>${song.title}</h3>
        <audio controls style="width:100%;">
          <source src="${song.file}" type="audio/mpeg">
          Your browser does not support audio.
        </audio>
        <br><br>
        <a href="${song.file}" download>
          <button>Download</button>
        </a>
        <button onclick="shareSong('${song.title}')">Share</button>
        <hr>
      `;

      container.appendChild(div);
    });

  })
  .catch(error => console.error("Error loading songs:", error));

function shareSong(title){
  const mainLink = window.location.href;
  if(navigator.share){
    navigator.share({
      title: title,
      text: "Listen on Bennix Music:",
      url: mainLink
    }).catch(()=>alert("Sharing failed"));
  } else {
    prompt("Copy this link:", mainLink);
  }
}
  </script>
