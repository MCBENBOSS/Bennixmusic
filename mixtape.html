<body>

<div class="section" id="mixtape-container"></div>

<footer>© 2026 BENNIX MUSIC | All Rights Reserved</footer>

<script>
const mixtapes = [
    {title:"Mixtape 1", file:"mixtapes/mixtape1.mp3"},
    {title:"Mixtape 2", file:"mixtapes/mixtape2.mp3"}
];

const container = document.getElementById("mixtape-container");

mixtapes.forEach(mt => {
    const div = document.createElement("div");
    div.className = "music-card";
    div.innerHTML = `
        <p>${mt.title}</p>
        <audio controls>
            <source src="${mt.file}" type="audio/mpeg">
        </audio>
        <br>
        <a href="${mt.file}" download><button>Download</button></a>
        <button onclick="shareMixtape('${mt.title}','${mt.file}')">Share</button>
    `;
    container.appendChild(div);
});

function shareMixtape(title,path){
    const fullLink = window.location.origin + "/" + path;
    if(navigator.share){
        navigator.share({title:title,text:"Listen to this mixtape:",url:fullLink})
        .catch(()=>alert("Sharing failed"));
    } else {
        prompt("Copy this link:", fullLink);
    }
}
</script>

</body>
