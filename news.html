<script>
const news = [
    {title:"MC BEN drops new single 'Fall For You'", file:"#"},
    {title:"Upcoming Music Event in Lagos", file:"#"},
    {title:"MC BEN featured on international playlist", file:"#"}
];

const container = document.getElementById("news-container");

news.forEach(n => {
    const div = document.createElement("div");
    div.className = "news-card";
    div.innerHTML = `
        <p>${n.title}</p>
        <a href="${n.file}"><button>Read More</button></a>
    `;
    container.appendChild(div);
});
</script>
