<section class="section-title">FEATURED SONGS</section>
<div id="featured-songs-container"></div>

<footer>© 2026 BENNIX MUSIC | All Rights Reserved</footer>

<script>
// Load songs from JSON
fetch('songs.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("featured-songs-container");

    // Show only the first 3 songs as featured
    data.slice(0, 3).forEach(song => {
      const div = document.createElement("div");
      div.className = "music-card";
      div.innerHTML = `
        <h3>${song.title}</h3>
        <audio controls>
          <source src="songs/${song.file}" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <br>
        <a href="songs/${song.file}" download><button>Download</button></a>
        <button onclick="shareSong('${song.title}')">Share</button>
      `;
      container.appendChild(div);
    });
  })
  .catch(err => console.error("Error loading songs:", err));

// Share function
function shareSong(title){
  const mainLink = window.location.href;
  if(navigator.share){
    navigator.share({title:title,text:"Listen on Bennix Music:",url:mainLink})
      .catch(()=>alert("Sharing failed"));
  } else {
    prompt("Copy this link:", mainLink);
  }
}
</script>
