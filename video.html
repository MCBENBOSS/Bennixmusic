<!DOCTYPE html>
<html>
<head>
<title>Bennix Music | Videos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">VIDEOS</div>

<nav>
    <a href="index.html">Home</a> |
    <a href="music.html">Music</a> |
    <a href="freebeat.html">Freebeats</a> |
    <a href="mixtape.html">Mixtapes</a> |
    <a href="video.html">Videos</a> |
    <a href="news.html">News</a> |
    <a href="about.html">About</a>
</nav>

<div class="section" id="video-container"></div>

<footer>© 2026 BENNIX MUSIC | All Rights Reserved</footer>

<script>
const videos = [
    {title:"MC BEN - Live Performance", file:"videos/live-performance.mp4"},
    {title:"MC BEN - Music Video", file:"videos/music-video.mp4"}
];

const container = document.getElementById("video-container");

videos.forEach(v => {
    const div = document.createElement("div");
    div.className = "music-card";
    div.innerHTML = `
        <p>${v.title}</p>
        <video controls width="100%">
            <source src="${v.file}" type="video/mp4">
        </video>
        <br>
        <a href="${v.file}" download><button>Download</button></a>
        <button onclick="shareVideo('${v.title}','${v.file}')">Share</button>
    `;
    container.appendChild(div);
});

function shareVideo(title,path){
    const fullLink = window.location.origin + "/" + path;
    if(navigator.share){
        navigator.share({title:title,text:"Watch this video:",url:fullLink})
        .catch(()=>alert("Sharing failed"));
    } else {
        prompt("Copy this link:", fullLink);
    }
}
</script>

</body>
</html>
