<section class="section-title">FEATURED SONGS</section>
<div id="featured-songs-container"></div>

<footer>© 2026 BENNIX MUSIC | All Rights Reserved</footer>

<script>
fetch('songs.json')
  .then(response => response.json())
  .then(data => {

    const container = document.getElementById("featured-songs-container");

    data.slice(0,3).forEach(song => {
      const div = document.createElement("div");
      div.className = "music-card";

      div.innerHTML = `
        <h3>${song.title}</h3>
        <audio controls style="width:100%;">
          <source src="${song.file}" type="audio/mpeg">
        </audio>
        <br><br>
        <a href="${song.file}" download>
          <button>Download</button>
        </a>
      `;

      container.appendChild(div);
    });

  })
  .catch(error => console.error("Error loading songs:", error));
  </script>
